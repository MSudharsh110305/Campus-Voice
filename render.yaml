databases:
  - name: campusvoice-db
    plan: free
    databaseName: campusvoice
    user: campusvoice_user

services:
  - type: web
    name: campusvoice-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd Campus-Voice-SREC-main/frontend && rm -rf node_modules && npm install --include=dev && node ./node_modules/vite/bin/vite.js build && cd ../..
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusvoice-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://campus-voice-frontend-k07w.onrender.com","http://localhost:5173","http://localhost:3000"]'
      - key: FRONTEND_URL
        value: https://campus-voice-frontend-k07w.onrender.com
      - key: VAPID_CLAIMS_EMAIL
        value: admin@srec.ac.in
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: PORT
        value: "10000"
